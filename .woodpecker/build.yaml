# Build baked scanner image — staging only
# The staging image becomes the production image via tag promotion on main merge
when:
  - event: push
    branch: staging

depends_on:
  - ci

labels:
  platform: linux
  backend: local

steps:
  - name: build
    image: bash
    environment:
      DOCKER_REGISTRY:
        from_secret: docker_registry
    commands:
      - scripts/woodpecker/build.sh

  - name: notify-status
    image: bash
    environment:
      SLACK_WEBHOOK_URL:
        from_secret: slack_webhook_url
    commands:
      - scripts/woodpecker/notify-status.sh
    when:
      - status: [success, failure]
    depends_on: [build]
