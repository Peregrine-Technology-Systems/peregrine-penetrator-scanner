# Docker build + push to Artifact Registry — development only
when:
  - event: push
    branch: development
    path:
      include:
        - "docker/Dockerfile"
        - "Gemfile"
        - "Gemfile.lock"
      exclude:
        - "docker/Dockerfile.base"
        - "docker/base-versions.txt"
        - "docker/wordlists/**"

depends_on:
  - ci

labels:
  platform: linux
  backend: local

steps:
  - name: build
    image: bash
    environment:
      DOCKER_REGISTRY:
        from_secret: docker_registry
    commands:
      - scripts/woodpecker/build.sh

  - name: notify-failure
    image: bash
    environment:
      SLACK_WEBHOOK_URL:
        from_secret: slack_webhook_url
    commands:
      - scripts/woodpecker/notify-slack.sh
    when:
      - status: failure
    depends_on: [build]
