# Trigger scans per environment — no Docker image tagging needed
when:
  - event: push
    branch: [staging, main]

depends_on:
  - ci

labels:
  platform: linux
  backend: local

steps:
  - name: deploy
    image: bash
    environment:
      DOCKER_REGISTRY:
        from_secret: docker_registry
      SLACK_WEBHOOK_URL:
        from_secret: slack_webhook_url
      NOTIFICATION_EMAIL:
        from_secret: notification_email
    commands:
      - scripts/woodpecker/deploy.sh

  - name: notify-failure
    image: bash
    environment:
      SLACK_WEBHOOK_URL:
        from_secret: slack_webhook_url
    commands:
      - scripts/woodpecker/notify-slack.sh
    when:
      - status: failure
    depends_on: [deploy]
