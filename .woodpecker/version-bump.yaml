# Version bump on main merge — tag release, update RELEASE_NOTES, tag Docker image
when:
  - event: push
    branch: main

clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      depth: 0

labels:
  platform: linux
  backend: local

steps:
  - name: version-bump
    image: bash
    environment:
      GH_TOKEN:
        from_secret: gh_token
      DOCKER_REGISTRY:
        from_secret: docker_registry
    commands:
      - scripts/woodpecker/version-bump.sh

  - name: notify-status
    image: bash
    environment:
      SLACK_WEBHOOK_URL:
        from_secret: slack_webhook_url
    commands:
      - scripts/woodpecker/notify-status.sh
    when:
      - status: [success, failure]
    depends_on: [version-bump]
