# Branch promotion â€” developmentâ†’staging (auto), stagingâ†’main (manual)
when:
  - event: push
    branch: [development, staging]

depends_on:
  - ci

labels:
  platform: linux
  backend: local

steps:
  - name: promote
    image: bash
    environment:
      GH_TOKEN:
        from_secret: gh_token
    commands:
      - scripts/woodpecker/promote.sh

  - name: notify-failure
    image: bash
    environment:
      SLACK_WEBHOOK_URL:
        from_secret: slack_webhook_url
    commands:
      - scripts/woodpecker/notify-slack.sh
    when:
      - status: failure
    depends_on: [promote]
