# Branch promotion â€” developmentâ†’staging (auto-merge), stagingâ†’main (manual review PR)
when:
  - event: push
    branch: [development, staging]

depends_on:
  - ci

labels:
  platform: linux
  backend: local

clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      depth: 0

steps:
  - name: promote
    image: bash
    environment:
      GH_TOKEN:
        from_secret: gh_token
    commands:
      - scripts/woodpecker/promote.sh

  - name: notify-status
    image: bash
    environment:
      SLACK_WEBHOOK_URL:
        from_secret: slack_webhook_url
    commands:
      - scripts/woodpecker/notify-status.sh
    when:
      - status: [failure]
    depends_on: [promote]
