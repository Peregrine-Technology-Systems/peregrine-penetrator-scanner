name: Promote

on:
  push:
    branches: [development, staging]

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine promotion target
        id: target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/development" ]; then
            echo "base=staging" >> "$GITHUB_OUTPUT"
            echo "title=Promote development → staging" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            echo "base=main" >> "$GITHUB_OUTPUT"
            echo "title=Promote staging → main" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing PR
        id: existing
        run: |
          COUNT=$(gh pr list --base "${{ steps.target.outputs.base }}" --head "${{ github.ref_name }}" --state open --json number --jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for new commits
        id: diff
        run: |
          COMMITS=$(git rev-list origin/${{ steps.target.outputs.base }}..origin/${{ github.ref_name }} --count 2>/dev/null || echo "0")
          echo "commits=$COMMITS" >> "$GITHUB_OUTPUT"

      - name: Create promotion PR
        if: steps.existing.outputs.count == '0' && steps.diff.outputs.commits != '0'
        run: |
          PR_URL=$(gh pr create \
            --base "${{ steps.target.outputs.base }}" \
            --head "${{ github.ref_name }}" \
            --title "${{ steps.target.outputs.title }}" \
            --body "$(cat <<'EOF'
          ## Promotion

          Automated promotion PR created after merge to `${{ github.ref_name }}`.

          🤖 Generated with [Claude Code](https://claude.com/claude-code)
          EOF
          )")
          echo "Created PR: $PR_URL"

          # Auto-merge for staging promotions only (not main)
          if [ "${{ steps.target.outputs.base }}" = "staging" ]; then
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
            gh pr merge "$PR_NUMBER" --auto --merge
            echo "Auto-merge enabled for staging promotion"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
