name: CI

on:
  push:
    branches: [development, staging, main]
  pull_request:
    branches: [development, staging, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:create db:migrate
        env:
          RAILS_ENV: test

      - name: Run RSpec
        run: bundle exec rspec --format documentation
        env:
          RAILS_ENV: test

      - name: Run RuboCop
        run: bundle exec rubocop --parallel

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env_tag=production" >> "$GITHUB_OUTPUT"
          else
            echo "env_tag=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/pentest/scanner:latest
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/pentest/scanner:${{ github.sha }}
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/pentest/scanner:${{ steps.tag.outputs.env_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  auto-merge:
    runs-on: ubuntu-latest
    needs: test
    if: >
      github.event_name == 'pull_request' &&
      (github.base_ref == 'development' || github.base_ref == 'staging')

    steps:
      - uses: actions/checkout@v4

      - name: Enable auto-merge
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
