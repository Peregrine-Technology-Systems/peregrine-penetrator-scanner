name: standard
description: "Standard scan - Full ZAP + Nuclei + Nikto + ffuf discovery"
estimated_duration_minutes: 30
rate_limit: 8
phases:
  - name: discovery
    tools:
      - tool: ffuf
        wordlist: /usr/share/seclists/Discovery/Web-Content/common.txt
        timeout: 300
        threads: 2
        rate: 8
      - tool: nikto
        timeout: 300
        pause: 1
    parallel: true
  - name: active_scan
    tools:
      - tool: zap
        mode: full
        timeout: 900
        delay_ms: 200
  - name: targeted
    tools:
      - tool: nuclei
        severity_filter: critical,high,medium
        timeout: 600
        templates: []
        rate_limit: 8
        bulk_size: 3
