<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <defs>
    <style>
      .logo-icon { fill: #1a365d; }
      .logo-text-primary { fill: #1a365d; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 0.05em; }
      .logo-text-secondary { fill: #1a365d; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 400; font-size: 10px; letter-spacing: 0.28em; }
      @media (prefers-color-scheme: dark) {
        .logo-icon { fill: #ffffff; }
        .logo-text-primary { fill: #ffffff; }
        .logo-text-secondary { fill: #ffffff; }
      }
    </style>
  </defs>

  <!-- Peregrine Falcon Wing Mark -->
  <g class="logo-icon" transform="translate(8, 6)">
    <!-- Main wing sweep - aggressive diving angle -->
    <path d="M32 4 C28 4, 18 10, 12 20 C8 27, 4 36, 2 44 C1 48, 0 52, 0 56 L6 50 C10 44, 16 36, 22 30 C26 26, 30 24, 34 24 C36 24, 38 25, 40 28 L44 22 C42 14, 38 8, 34 5 Z" />
    <!-- Secondary wing feathers -->
    <path d="M14 46 C18 40, 24 34, 30 30 C34 28, 38 28, 42 30 L48 24 C44 20, 38 18, 32 20 C24 22, 16 30, 10 40 C6 46, 4 52, 3 56 L8 52 Z" opacity="0.7" />
    <!-- Head and beak -->
    <path d="M34 4 C36 2, 40 0, 44 0 C48 0, 52 2, 54 6 C56 10, 56 14, 54 18 L48 14 C48 10, 46 6, 42 4 Z" />
    <!-- Eye notch (malar stripe - characteristic of peregrines) -->
    <path d="M44 6 C46 6, 48 8, 48 10 C48 12, 46 14, 44 14 C42 14, 40 12, 40 10 C40 8, 42 6, 44 6 Z" fill="#ffffff" opacity="0.3" />
    <!-- Tail detail -->
    <path d="M2 56 L0 64 L10 58 L18 54 L12 52 Z" opacity="0.5" />
  </g>

  <!-- Company Name -->
  <text class="logo-text-primary" x="78" y="40">PEREGRINE</text>
  <text class="logo-text-secondary" x="78" y="56">TECHNOLOGY SYSTEMS</text>

  <!-- Accent line -->
  <rect class="logo-icon" x="78" y="62" width="40" height="2" rx="1" opacity="0.3" />
</svg>
